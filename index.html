<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<!-- FIX WARNING -->
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="format-detection" content="telephone=no">

<title>Chat App</title>

<link rel="preconnect" href="https://www.gstatic.com">
<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="container">

<!-- HEADER -->
<div class="header">

<span>Chat App</span>

<div class="header-buttons">

<button class="menu-btn" id="menuBtn" onclick="toggleMenu()" style="display:none;">⋮</button>

<div class="menu-dropdown" id="menuDropdown" style="display:none;">
<button onclick="deleteChatConfirm()" class="delete-chat">🗑️ Borrar Chat</button>
</div>

<button class="logout" onclick="logout()" style="display:none;">Salir</button>

</div>

</div>

<!-- LOGIN -->
<div class="login" id="loginSection">

<h2>Iniciar Sesión</h2>

<input type="email" id="username" placeholder="Correo">

<input type="password" id="password" placeholder="Contraseña">

<button onclick="login()">Entrar</button>

<button onclick="register()" style="margin-top:10px; background:#555;">
Crear cuenta
</button>

</div>

<!-- CHAT -->
<div class="chat" id="chatSection" style="display:none;">
<div class="messages" id="messages"></div>
</div>

<!-- FOOTER -->
<div class="footer" id="chatFooter" style="display:none;">

<input type="file" id="fileInput" accept="image/*,video/*" hidden>

<button onclick="document.getElementById('fileInput').click()">📷</button>

<input type="text" id="messageInput" placeholder="Mensaje">

<button onclick="sendMessage()">➤</button>

</div>

<!-- MODAL CONFIRMACION -->
<div class="confirmation-modal" id="confirmationModal">
<div class="confirmation-content">

<h3>Confirmar</h3>
<p>¿Eliminar mensaje?</p>

<div class="confirmation-buttons">
<button onclick="closeConfirmation()">Cancelar</button>
<button onclick="confirmDelete()">Eliminar</button>
</div>

</div>
</div>

</div>

<!-- APP -->
<script type="module" src="app.js"></script>

</body>
</html>
